<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Junny</title>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ff7f50">

  <link rel="icon" href="icon-513.png" type="image/png">
  <link rel="apple-touch-icon" href="icon-513.png">

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      background: #e8ffdc;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .tabs {
      display: flex;
      justify-content: center;
      gap: 28px;
      flex-wrap: wrap;
    }

    .tab {
      width: 100px;
      text-align: center;
      cursor: pointer;
      transition: transform 0.25s;
    }

    .tab:hover {
      transform: scale(1.08);
    }

    .tab img {
      width: 64px;
      height: 64px;
      border-radius: 18px;
      background: #cfe7c4;
      padding: 10px;
    }

    .tab p {
      margin-top: 8px;
      font-size: 14px;
      color: #333;
      font-weight: 500;
    }

    footer {
      position: fixed;
      bottom: 12px;
      width: 100%;
      text-align: center;
      font-size: 0.85rem;
      color: #aaa;
    }
  </style>
</head>

<body>

  <div class="tabs">

    <div class="tab" onclick="openTab('tab1.html')">
      <img src="https://img.icons8.com/ios-filled/100/2e7d32/beach.png">
      <p>Chi phí du lịch</p>
    </div>
    
    <div class="tab" onclick="openTab('tab2.html')">
      <img src="https://img.icons8.com/ios-filled/100/ff7f50/calendar.png">
      <p>Lịch trình</p>
    </div>
    
    <div class="tab" onclick="openTab('tab3.html')">
      <img src="https://img.icons8.com/ios-filled/100/money.png">
      <p>Chi phí thực tế</p>
    </div>

  </div>

  <footer>© 2025 Lê Thị Ngọc Dung</footer>

  <script>
    function openTab(file) {
      window.location.href = file;
    }
  </script>

</body>

</html>
